# sops configuration
# Secrets are encrypted with a single personal age key.
# Generate with: age-keygen -o age-key.txt
# Store the private key in 1Password — never commit it.
# Place on any machine at: ~/.config/sops/age/keys.txt

keys:
  - &personal age1qwezkj3spk2gznm0vp3zd472dfqdr4dlh7da3p0z72megqk9qefsnza8xd

creation_rules:
  - path_regex: secrets/.*\.yaml$
    key_groups:
      - age:
          - *personal
